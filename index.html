<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maze - Wersja 2.0</title>
    
    <!-- Preconnect dla szybszego wczytywania fontów (poprawa LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- UWAGA: Używamy display=swap, aby tekst natychmiast się wyrenderował i nie podnosił wskaźnika LCP -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800;900&family=Outfit:wght@300;500;700;900&family=Kaushan+Script&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --text-main: #2c3e50;
            --text-accent: #05c46b;
            --glass-white: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --vibrant-pink: #ff9ff3;
            --sun-yellow: #feca57;
            --fresh-green: #1dd1a1;
        }

        body {
            background:
                linear-gradient(180deg, rgba(255, 248, 223, 0.22) 0%, rgba(240, 249, 234, 0.12) 100%),
                url('assets/themaze-summer-bg.jpg') center center / cover no-repeat;
            background-color: #f6e9bf;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: var(--text-main);
            cursor: default;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.5) 18%, rgba(255, 248, 228, 0.18) 38%, rgba(255, 255, 255, 0.04) 62%, transparent 100%),
                linear-gradient(180deg, rgba(255, 245, 216, 0.16) 0%, rgba(239, 248, 235, 0.08) 65%, rgba(255, 255, 255, 0.04) 100%);
            pointer-events: none;
            z-index: 0;
        }

        i[data-lucide] {
            display: inline-block;
        }

        /* --- TYPOGRAFIA --- */
        .animate-enter {
            opacity: 0;
            transform: translateY(30px);
            animation: bounceIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translate3d(0, 30px, 0) scale(0.95); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }

        .title-happy {
            font-family: 'Unbounded', sans-serif;
            background: linear-gradient(to right, #05c46b, #1dd1a1, #ff9ff3, #feca57, #05c46b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: 
                drop-shadow(0 15px 25px rgba(5, 196, 107, 0.4)) 
                drop-shadow(0 4px 0px rgba(255, 255, 255, 1))
                drop-shadow(0 -1px 2px rgba(255, 255, 255, 0.8));
            letter-spacing: -0.05em;
            line-height: 1.1;
            will-change: background-position;
            animation: shineGradient 6s linear infinite;
        }

        @keyframes shineGradient {
            to { background-position: 200% center; }
        }

        .subtitle-hand {
            font-family: 'Kaushan Script', cursive;
            font-size: 2.2rem;
            color: #ff9ff3;
            transform: rotate(-5deg);
            display: inline-block;
            text-shadow: 2px 2px 0px rgba(255,255,255,1), 0 5px 15px rgba(255, 159, 243, 0.5);
            min-height: 48px;
        }

        /* --- PRZYCISK: GLASS --- */
        .btn-container {
            position: relative;
            z-index: 20;
            border-radius: 50px;
            box-shadow: 0 24px 55px -14px rgba(5, 196, 107, 0.26), 0 16px 30px -18px rgba(255, 199, 103, 0.45);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            animation: pulse-shadow 3s infinite alternate;
        }

        @keyframes pulse-shadow {
            0% { box-shadow: 0 22px 44px -14px rgba(5, 196, 107, 0.18), 0 12px 25px -18px rgba(255, 199, 103, 0.32); }
            100% { box-shadow: 0 28px 56px -10px rgba(255, 159, 243, 0.28), 0 16px 30px -18px rgba(255, 199, 103, 0.4); }
        }

        .btn-inner {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 249, 239, 0.3) 100%);
            border: 1px solid rgba(255, 255, 255, 0.88);
            border-bottom-color: rgba(255, 231, 183, 0.45);
            border-right-color: rgba(255, 231, 183, 0.45);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.96), inset 0 -2px 5px rgba(255, 255, 255, 0.28);
            border-radius: 50px;
            padding: 20px 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            position: relative;
            overflow: hidden;
            transform: translate3d(0,0,0);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .btn-inner::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-container:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 30px 60px -14px rgba(5, 196, 107, 0.28), 0 18px 36px -18px rgba(255, 199, 103, 0.5);
        }
        
        .btn-container:hover .btn-inner {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 248, 232, 0.38) 100%);
            border-color: rgba(255, 255, 255, 0.96);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 1), inset 0 -2px 5px rgba(255, 255, 255, 0.3);
        }

        .btn-container:hover .btn-inner::after {
            left: 150%;
        }

        .icon-bounce {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-container:hover .icon-bounce {
            transform: scale(1.2) rotate(15deg);
        }

        .dynamic-text {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* --- INFO PILL --- */
        .info-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.84);
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            box-shadow: 0 10px 24px -18px rgba(0,0,0,0.18);
            backdrop-filter: blur(12px);
        }

        /* --- MODAL (Klasyczny czysty wygląd) --- */
        .modal-overlay {
            --overlay-bg: rgba(15, 23, 42, 0.22);
            --overlay-blur: blur(16px);
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0s linear 0.35s;
            isolation: isolate;
            will-change: opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .modal-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--overlay-bg);
            backdrop-filter: var(--overlay-blur);
            -webkit-backdrop-filter: var(--overlay-blur);
            transform: translateZ(0);
            backface-visibility: hidden;
            pointer-events: none;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
            visibility: visible;
            transition: opacity 0.35s ease;
        }
        
        .modal-window {
            position: relative;
            z-index: 1;
            transform: translate3d(0, 50px, 0) scale(0.8);
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            will-change: transform, opacity;
            backface-visibility: hidden;
            contain: layout paint;
            
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #fff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(100, 100, 100, 0.2);
            width: 90%; max-width: 420px;
            overflow: hidden;
            color: #333;
        }
        .modal-overlay.active .modal-window {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .progress-track {
            background: #eee;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(45deg, #05c46b 25%, #1dd1a1 25%, #1dd1a1 50%, #05c46b 50%, #05c46b 75%, #1dd1a1 75%, #1dd1a1 100%);
            background-size: 20px 20px;
            border-radius: 20px;
            transition: width 0.1s linear;
            animation: moveStripes 1s linear infinite;
        }

        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        .vignette { 
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0) 28%, rgba(255, 255, 255, 0.18) 58%, rgba(255, 244, 218, 0.58) 100%),
                linear-gradient(180deg, rgba(255, 248, 229, 0.18) 0%, rgba(255, 255, 255, 0) 35%, rgba(248, 241, 214, 0.18) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- NO SCROLLBAR UTILITY --- */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- PŁYWAJĄCY PRZYCISK SZKLANY (ZAWSZE WIDOCZNY W ROGU) --- */
        .btn-container-archive {
            border-radius: 50px;
            box-shadow: 0 18px 34px -16px rgba(15, 23, 42, 0.2), 0 10px 20px -18px rgba(148, 163, 184, 0.35);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
        }

        .btn-inner-archive {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.48) 100%);
            border: 1px solid rgba(255, 255, 255, 0.88);
            border-bottom-color: rgba(203, 213, 225, 0.5);
            border-right-color: rgba(203, 213, 225, 0.5);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.94), inset 0 -2px 5px rgba(255, 255, 255, 0.26);
            border-radius: 50px;
            padding: 8px 18px 8px 8px; /* asymetryczny padding ze względu na okrągłą ikonkę z lewej */
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            position: relative;
            overflow: hidden;
            transform: translate3d(0,0,0);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* Szklany połysk przelatujący przez przycisk na hover */
        .btn-inner-archive::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-container-archive:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 22px 42px -18px rgba(15, 23, 42, 0.24), 0 12px 24px -18px rgba(148, 163, 184, 0.42);
        }
        
        .btn-container-archive:hover .btn-inner-archive {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96) 0%, rgba(248, 250, 252, 0.58) 100%);
            border-color: rgba(255, 255, 255, 0.96);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 1), inset 0 -2px 5px rgba(255, 255, 255, 0.3);
        }

        .btn-container-archive:hover .btn-inner-archive::after {
            left: 150%;
        }

        .icon-bounce-archive {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-container-archive:hover .icon-bounce-archive {
            transform: scale(1.15) rotate(10deg);
        }

        .archive-modal-window {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.995) 0%, rgba(252, 252, 253, 0.995) 100%);
            border: 1px solid rgba(15, 23, 42, 0.1);
            box-shadow: 0 42px 90px -38px rgba(0, 0, 0, 0.42), 0 22px 36px -30px rgba(15, 23, 42, 0.22);
        }

        .archive-modal-window::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.6) 0%, transparent 34%),
                radial-gradient(circle at bottom left, rgba(226, 232, 240, 0.12) 0%, transparent 42%);
            pointer-events: none;
        }

        .archive-modal-window::after {
            content: '';
            position: absolute;
            inset: 16px;
            border-radius: 32px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            pointer-events: none;
        }

        #archiveModalOverlay {
            --overlay-bg: rgba(15, 23, 42, 0.34);
            --overlay-blur: blur(22px) saturate(0.9);
        }

        .archive-header-icon {
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(241, 245, 249, 0.88) 100%);
            color: #111827;
            border: 1px solid rgba(15, 23, 42, 0.12);
            box-shadow: 0 12px 24px -20px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.98);
        }

        .archive-close-btn {
            color: #111827;
            transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }

        .archive-close-btn:hover {
            background: rgba(15, 23, 42, 0.92);
            color: #ffffff;
            box-shadow: 0 10px 20px -16px rgba(0, 0, 0, 0.5);
            transform: rotate(90deg);
        }

        .archive-entry {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(250, 250, 251, 1) 100%);
            border: 1px solid rgba(15, 23, 42, 0.12);
            box-shadow: 0 16px 28px -24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.98);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .archive-entry::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(17, 24, 39, 0.035) 0%, transparent 18%);
            pointer-events: none;
        }

        .archive-entry:hover {
            transform: translateY(-2px) scale(1.01);
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(249, 250, 251, 1) 100%);
            border-color: rgba(17, 24, 39, 0.2);
            box-shadow: 0 22px 34px -24px rgba(0, 0, 0, 0.28), 0 10px 18px -20px rgba(148, 163, 184, 0.14);
        }

        .archive-entry-icon {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 252, 0.86) 100%);
            border: 1px solid rgba(15, 23, 42, 0.1);
            color: #111827;
            box-shadow: 0 8px 18px -18px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.95);
            transition: color 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .archive-entry:hover .archive-entry-icon {
            color: #ffffff;
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.96) 0%, rgba(31, 41, 55, 0.96) 100%);
            border-color: rgba(17, 24, 39, 0.96);
            transform: scale(1.05);
            box-shadow: 0 12px 22px -18px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .archive-entry-download {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 252, 0.86) 100%);
            border: 1px solid rgba(15, 23, 42, 0.1);
            color: #111827;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
            transition: transform 0.3s ease, background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .archive-entry:hover .archive-entry-download {
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.96) 0%, rgba(31, 41, 55, 0.96) 100%);
            border-color: rgba(17, 24, 39, 0.96);
            color: #ffffff;
            transform: scale(1.08);
            box-shadow: 0 12px 20px -18px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .archive-entry-title {
            color: #020617;
            font-size: 1rem;
            line-height: 1.15;
            letter-spacing: -0.02em;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .archive-file-name {
            color: #334155;
            font-size: 0.72rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 0.14em;
            opacity: 0.92;
        }

        /* --- MOTYW LATA (.theme-summer on body) --- */
        body.theme-summer .subtitle-hand {
            color: #e17055;
            text-shadow: 2px 2px 0px rgba(255,255,255,1), 0 5px 15px rgba(225, 112, 85, 0.45);
        }

    </style>
</head>
<body class="theme-summer h-screen w-screen flex flex-col items-center justify-center">

    <!-- Statyczna nakładka tła -->
    <div class="vignette"></div>

    <!-- Pływający Przycisk Archiwum -->
    <div onclick="openArchiveModal()" class="fixed top-6 right-6 lg:top-8 lg:right-8 z-40 btn-container-archive group cursor-pointer">
        <div class="btn-inner-archive">
            <!-- Dodatkowa szklana obwódka dla samej ikony (jak w głównym przycisku) -->
            <div class="w-10 h-10 bg-white/70 backdrop-blur-md border border-white/80 shadow-[inset_0_2px_4px_rgba(255,255,255,0.9)] rounded-full flex items-center justify-center shrink-0 icon-bounce-archive">
                <i data-lucide="archive" class="w-5 h-5 text-slate-600 drop-shadow-md"></i>
            </div>
            <span class="text-xs font-black text-gray-800 uppercase tracking-widest drop-shadow-sm pr-2">Archiwum</span>
        </div>
    </div>

    <!-- Główna Zawartość -->
    <main class="relative z-10 flex flex-col items-center text-center select-none w-full max-w-5xl px-6 max-h-[100vh] overflow-y-auto pb-10 no-scrollbar">
        
        <!-- Header -->
        <div class="relative mb-8 mt-10 animate-enter">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-white/65 blur-[60px] rounded-full pointer-events-none"></div>
            
            <h2 id="season-subtitle" class="subtitle-hand mb-2">Gorące Lato!</h2>
            <h1 id="btn-text" class="title-happy text-7xl md:text-9xl font-black tracking-tighter leading-none mb-6">THE MAZE</h1>
            
            <!-- Dynamiczna Plakietka Wersji -->
            <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/45 border border-white/70 shadow-[0_12px_30px_rgba(255,255,255,0.18),inset_0_2px_5px_rgba(255,255,255,0.84)] backdrop-blur-xl dynamic-text w-[240px] justify-center">
                <div id="version-icon-wrapper" class="w-5 h-5 flex items-center justify-center shrink-0">
                    <i id="version-icon" data-lucide="sparkles" class="w-4 h-4 text-orange-500 animate-pulse"></i>
                </div>
                <span id="version-badge" class="text-sm font-bold uppercase tracking-widest text-gray-700 drop-shadow-sm whitespace-nowrap">Wersja 2.0</span>
            </div>
        </div>

        <!-- Sekcja Przycisku -->
        <div class="flex flex-col items-center gap-6 w-full animate-enter delay-200">
            
            <button class="btn-container group cursor-pointer" onclick="openDownloadModal()">
                <div class="btn-inner">
                    <div class="icon-bounce p-3 bg-white/55 backdrop-blur-md border border-white/70 rounded-2xl shadow-[inset_0_2px_4px_rgba(255,255,255,0.9)] flex items-center justify-center">
                        <i data-lucide="sun" class="w-8 h-8 text-yellow-500 drop-shadow-md"></i>
                    </div>
                    
                    <div class="text-left dynamic-text w-[300px]" id="btn-text-wrapper">
                        <div id="btn-subtext" class="text-[10px] text-gray-600 font-bold tracking-[0.2em] uppercase mb-1 drop-shadow-sm truncate">Dostępne wyłącznie na Windows 11</div>
                        <div id="btn-title-text" class="text-2xl font-black text-gray-800 tracking-wide font-outfit drop-shadow-md group-hover:text-emerald-600 transition-colors whitespace-nowrap">POBIERZ TERAZ</div>
                    </div>

                    <div class="bg-white/55 backdrop-blur-md border border-white/70 p-2 rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.8)] flex items-center justify-center shrink-0">
                        <i data-lucide="arrow-right" class="w-5 h-5 text-emerald-600 group-hover:translate-x-1 transition-transform drop-shadow-sm"></i>
                    </div>
                </div>
            </button>
            
            <!-- Rozmiar -->
            <div class="info-pill animate-enter delay-300 dynamic-text w-[200px] justify-center" id="size-wrapper">
                <i data-lucide="cloud-download" class="w-4 h-4 text-emerald-500 shrink-0"></i>
                <span class="uppercase font-bold text-gray-600 whitespace-nowrap">Rozmiar: <span id="size-text" class="text-emerald-600 font-black ml-1">90.7 MB</span></span>
            </div>

        </div>
    </main>

    <!-- Modal Instalatora (Klasyczny czysty wygląd + Przycisk Anuluj) -->
    <div id="modalOverlay" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-window p-8 relative">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-green-200/50 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-yellow-200/50 rounded-full blur-3xl pointer-events-none"></div>

            <div class="flex justify-between items-center mb-6 relative z-10">
                <h3 class="text-xl font-bold text-gray-800 tracking-tight">Instalator</h3>
                <button onclick="cancelDownload()" class="p-2 hover:bg-gray-100 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button>
            </div>

            <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border border-gray-100 mb-8 relative z-10 shadow-inner">
                <div id="modal-icon-wrapper" class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-emerald-500 shadow-sm border border-gray-100">
                    <i id="modal-icon" data-lucide="package" class="w-6 h-6"></i>
                </div>
                <div>
                    <div id="modal-filename" class="text-base font-bold text-gray-800 truncate max-w-[200px]">themaze.zip</div>
                    <div id="modal-filedesc" class="text-xs text-gray-500 font-medium truncate max-w-[200px]">Oficjalny pakiet instalacyjny</div>
                </div>
            </div>

            <div class="flex justify-between text-[11px] text-gray-400 font-bold uppercase tracking-widest mb-2 relative z-10">
                <span id="statusText">Gotowy do startu</span>
                <span id="percentText" class="text-emerald-600 font-black">0%</span>
            </div>
            
            <div class="progress-track w-full mb-3 relative z-10">
                <div id="progressBar" class="progress-fill"></div>
            </div>

            <!-- Przycisk Anuluj pobieranie -->
            <div class="flex justify-center relative z-10 h-8">
                <button id="cancelBtn" onclick="cancelDownload()" class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors py-1 px-4 rounded-full hover:bg-red-50">Anuluj pobieranie</button>
            </div>

            <div id="successMsg" class="absolute inset-0 bg-white/95 backdrop-blur-xl flex flex-col items-center justify-center z-20 transition-all duration-500 opacity-0 pointer-events-none translate-y-4 rounded-[40px]">
                <div class="relative mb-4">
                     <div class="absolute inset-0 bg-green-200 blur-xl opacity-50 rounded-full"></div>
                     <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center text-green-500 border border-green-100 relative z-10">
                        <i data-lucide="check-circle" class="w-8 h-8"></i>
                    </div>
                </div>
                <h3 class="text-gray-800 font-black text-xl mb-1">Sukces!</h3>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-6">Pobieranie rozpoczęte</p>
                <button onclick="closeModal()" class="px-8 py-3 rounded-full bg-gray-900 text-white text-xs font-bold tracking-widest uppercase hover:bg-gray-800 hover:scale-105 transition-all shadow-lg">Zamknij</button>
            </div>
        </div>
    </div>

    <!-- Modal Archiwum -->
    <div id="archiveModalOverlay" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-window archive-modal-window p-6 relative w-full max-w-[480px]">
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-white/70 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-20 -right-16 w-40 h-40 bg-slate-100/60 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex justify-between items-center mb-6 relative z-10">
                <div class="flex items-center gap-3">
                    <div class="archive-header-icon w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                        <i data-lucide="archive" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-black text-gray-900 tracking-tight font-outfit uppercase">Archiwum wersji</h3>
                </div>
                <button onclick="closeArchiveModal()" class="archive-close-btn p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <!-- Lista plików w archiwum bez scrollbara wizualnego -->
            <div class="flex flex-col gap-3 max-h-[50vh] overflow-y-auto no-scrollbar relative z-10 pb-2">
                
                <!-- Wersja 1.0 -->
                <button onclick="downloadFromArchive('themaze1_0_archive.zip', 'Archiwum - Wersja 1.0')" class="archive-entry flex items-center justify-between p-4 rounded-[30px] group w-full text-left">
                    <div class="flex items-center gap-4">
                        <div class="archive-entry-icon w-10 h-10 rounded-xl flex items-center justify-center shrink-0">
                            <i data-lucide="history" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="archive-entry-title text-sm font-black mb-0.5">Wersja 1.0</div>
                            <div class="archive-file-name text-[10px] uppercase font-bold">themaze1_0_archive.zip</div>
                        </div>
                    </div>
                    <div class="archive-entry-download w-8 h-8 rounded-full flex items-center justify-center">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                </button>

                <!-- Wersja 1.1 -->
                <button onclick="downloadFromArchive('themaze1_1_archive.zip', 'Archiwum - Wersja 1.1')" class="archive-entry flex items-center justify-between p-4 rounded-[30px] group w-full text-left">
                    <div class="flex items-center gap-4">
                        <div class="archive-entry-icon w-10 h-10 rounded-xl flex items-center justify-center shrink-0">
                            <i data-lucide="history" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="archive-entry-title text-sm font-black mb-0.5">Wersja 1.1</div>
                            <div class="archive-file-name text-[10px] uppercase font-bold">themaze1_1_archive.zip</div>
                        </div>
                    </div>
                    <div class="archive-entry-download w-8 h-8 rounded-full flex items-center justify-center">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                </button>

                <!-- Wersja 1.2 -->
                <button onclick="downloadFromArchive('themaze1_2_archive.zip', 'Archiwum - Wersja 1.2')" class="archive-entry flex items-center justify-between p-4 rounded-[30px] group w-full text-left">
                    <div class="flex items-center gap-4">
                        <div class="archive-entry-icon w-10 h-10 rounded-xl flex items-center justify-center shrink-0">
                            <i data-lucide="history" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="archive-entry-title text-sm font-black mb-0.5">Wersja 1.2</div>
                            <div class="archive-file-name text-[10px] uppercase font-bold">themaze1_2_archive.zip</div>
                        </div>
                    </div>
                    <div class="archive-entry-download w-8 h-8 rounded-full flex items-center justify-center">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                </button>

                <!-- Wersja 1.5 -->
                <button onclick="downloadFromArchive('themaze1_5_archive.zip', 'Archiwum - Wersja 1.5')" class="archive-entry flex items-center justify-between p-4 rounded-[30px] group w-full text-left">
                    <div class="flex items-center gap-4">
                        <div class="archive-entry-icon w-10 h-10 rounded-xl flex items-center justify-center shrink-0">
                            <i data-lucide="history" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="archive-entry-title text-sm font-black mb-0.5">Wersja 1.5</div>
                            <div class="archive-file-name text-[10px] uppercase font-bold">themaze1_5_archive.zip</div>
                        </div>
                    </div>
                    <div class="archive-entry-download w-8 h-8 rounded-full flex items-center justify-center">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                </button>

            </div>
        </div>
    </div>

    <script>
        const currentRelease = {
            file: 'themaze.zip',
            modalDesc: 'Oficjalny pakiet instalacyjny'
        };

        let currentDownloadTarget = null; // Trzyma informacje o obecnie wybranym pliku

        function renderDynamicIcon(target, iconName, className, id = null) {
            const iconDefinition = lucide.icons && lucide.icons[iconName];
            if (!target || !iconDefinition) return false;

            const attrs = { class: className };
            if (id) attrs.id = id;

            target.innerHTML = iconDefinition.toSvg(attrs);
            return true;
        }

        lucide.createIcons();

        /* ARCHIVE MODAL LOGIC */
        const archiveModalOverlay = document.getElementById('archiveModalOverlay');

        function openArchiveModal() {
            archiveModalOverlay.classList.add('active');
        }

        function closeArchiveModal() {
            archiveModalOverlay.classList.remove('active');
        }

        function downloadFromArchive(file, desc) {
            closeArchiveModal();
            setTimeout(() => {
                openDownloadModal(file, desc);
            }, 400); // Czeka aż modal archiwum się zamknie przed otwarciem pobierania
        }

        /* DOWNLOAD LOGIC Z OBSŁUGĄ ARCHIWUM */
        const modalOverlay = document.getElementById('modalOverlay');
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');
        const statusText = document.getElementById('statusText');
        const successMsg = document.getElementById('successMsg');
        const cancelBtn = document.getElementById('cancelBtn');
        const modalIconWrapper = document.getElementById('modal-icon-wrapper');
        let isDownloading = false;
        let downloadInterval;

        function clearDownloadInterval() {
            if (!downloadInterval) return;
            clearInterval(downloadInterval);
            downloadInterval = null;
        }

        // openDownloadModal przyjmuje opcjonalne parametry dla archiwum.
        function openDownloadModal(customFile = null, customDesc = null) {
            if (isDownloading) return;
            isDownloading = true;

            // Przygotowanie danych do wyświetlenia w modalu
            if (customFile) {
                currentDownloadTarget = { file: customFile, desc: customDesc };
                document.getElementById('modal-filename').innerText = customFile;
                document.getElementById('modal-filedesc').innerText = customDesc;
                const archiveIconRendered = renderDynamicIcon(modalIconWrapper, 'archive', 'w-6 h-6', 'modal-icon');
                if (!archiveIconRendered) {
                    document.getElementById('modal-icon').setAttribute('data-lucide', 'archive');
                    lucide.createIcons();
                }
            } else {
                currentDownloadTarget = { file: currentRelease.file, desc: currentRelease.modalDesc };
                document.getElementById('modal-filename').innerText = currentRelease.file;
                document.getElementById('modal-filedesc').innerText = currentRelease.modalDesc;
                const packageIconRendered = renderDynamicIcon(modalIconWrapper, 'package', 'w-6 h-6', 'modal-icon');
                if (!packageIconRendered) {
                    document.getElementById('modal-icon').setAttribute('data-lucide', 'package');
                    lucide.createIcons();
                }
            }

            modalOverlay.classList.add('active');
            cancelBtn.style.display = 'block';
            
            let progress = 0;
            clearDownloadInterval();
            downloadInterval = setInterval(() => {
                progress += Math.random() * 3 + 1;
                if (progress >= 100) {
                    progress = 100;
                    clearDownloadInterval();
                    finishDownload();
                }
                updateUI(progress);
            }, 50);
        }

        function cancelDownload() {
            if (!isDownloading) {
                closeModal();
                return;
            }
            clearDownloadInterval();
            isDownloading = false;
            statusText.innerText = "Pobieranie przerwane";
            closeModal();
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            clearDownloadInterval();
            setTimeout(() => {
                isDownloading = false;
                successMsg.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                successMsg.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                progressBar.style.width = '0%';
                percentText.innerText = '0%';
                statusText.innerText = 'Gotowy do startu';
            }, 500);
        }

        function updateUI(progress) {
            progressBar.style.width = `${progress}%`;
            percentText.innerText = `${Math.floor(progress)}%`;
            if (progress < 40) statusText.innerText = "Przygotowywanie plików...";
            else if (progress < 80) statusText.innerText = "Nawiązywanie połączenia...";
            else statusText.innerText = "Inicjalizacja pobierania...";
        }

        function finishDownload() {
            statusText.innerText = "Gotowe!";
            cancelBtn.style.display = 'none';
            
            setTimeout(() => {
                successMsg.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                successMsg.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                
                // Wykorzystanie zmiennej z przechwyconym plikiem docelowym (main lub archiwum)
                const fileToDownload = currentDownloadTarget.file;
                const link = document.createElement('a');
                link.href = fileToDownload;
                link.download = fileToDownload;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            }, 400);
        }

    </script>
</body>
</html>
